# ── Bluetooth ─────────────────────────────────────────────────────────────────
# CONFIG_BT se habilita automáticamente por el shield; solo ajustamos intervalos.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9

# ── Split inalámbrico (BLE entre mitades) ─────────────────────────────────────
# Ya habilitado por el shield corne; lo dejamos explícito por claridad.
CONFIG_ZMK_SPLIT_BLE=y

# ── RGB underglow ─────────────────────────────────────────────────────────────
# Desactivá RGB_UNDERGLOW y activá AUTO_OFF para mejorar duración de batería.
CONFIG_ZMK_RGB_UNDERGLOW=n
#CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
#CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
