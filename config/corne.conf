# ── Bluetooth ─────────────────────────────────────────────────────────────────
# CONFIG_BT se habilita automáticamente por el shield; solo ajustamos intervalos.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9

# ── Split inalámbrico (BLE entre mitades) ─────────────────────────────────────
# Ya habilitado por el shield corne; lo dejamos explícito por claridad.
CONFIG_ZMK_SPLIT_BLE=y

# ── Batería ───────────────────────────────────────────────────────────────────
# Habilita reportes de nivel de batería (requerido por battery_rgb_blink)
CONFIG_ZMK_BATTERY_REPORTING=y

# Blink rojo con batería baja (<20%).  Cada mitad opera de forma independiente.
CONFIG_ZMK_BATTERY_RGB_BLINK=y

# ── RGB underglow ─────────────────────────────────────────────────────────────
CONFIG_ZMK_RGB_UNDERGLOW=y
# Drivers requeridos para WS2812 en nice!nano v2 (sin esto falla el linker)
CONFIG_SPI=y
CONFIG_WS2812_STRIP=y
# Apagar automáticamente al desconectar USB
# El usuario puede encenderlo igual con RGB_TOG aunque esté en batería
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
# Apagar también al quedar inactivo (ahorra batería si se encendió manualmente)
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
